<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>【検索用】事前確認チェックシート</title>
<style>
  :root{
    --ink:#1c1f1a;
    --paper:#f7f5ef;
    --line:#d8d4c4;
    --moss:#3f5b44;
    --moss-deep:#2c4131;
    --clay:#b5563a;
    --muted:#7a7666;
    --card:#ffffff;
    --danger:#b5563a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  /* ---------- レイアウト共通 ---------- */
  .screen{
    display:none;
    min-height:100vh;
    flex-direction:column;
  }
  .screen.active{display:flex;}

  /* ---------- ログイン画面 ---------- */
  #loginScreen{
    justify-content:center;
    align-items:center;
    padding:24px;
    background:
      radial-gradient(circle at 15% 10%, rgba(63,91,68,0.08), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(181,86,58,0.07), transparent 45%),
      var(--paper);
  }
  .login-card{
    width:100%;
    max-width:360px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px 26px 28px;
    box-shadow:0 1px 2px rgba(28,31,26,0.04);
  }
  .brand-mark{
    width:40px;height:40px;
    border-radius:8px;
    background:var(--moss);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:18px;
  }
  .brand-mark svg{width:20px;height:20px;}
  .login-card h1{
    font-size:18px;
    font-weight:700;
    margin:0 0 8px;
    letter-spacing:0.02em;
    line-height:1.5;
  }
  .login-card .sub{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 26px;
    line-height:1.6;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:11.5px;
    font-weight:600;
    color:var(--muted);
    letter-spacing:0.04em;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:13px 14px;
    font-size:16px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fcfbf8;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--moss);background:#fff;}
  .btn-primary{
    width:100%;
    padding:14px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.03em;
    color:#fff;
    background:var(--moss);
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:6px;
    transition:background .15s, transform .1s;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{background:#a9a397;cursor:default;}
  .login-error{
    display:none;
    background:#fbeae5;
    color:var(--danger);
    font-size:12.5px;
    padding:10px 12px;
    border-radius:7px;
    margin-bottom:16px;
    line-height:1.5;
  }
  .login-error.show{display:block;}

  /* ---------- 検索画面ヘッダー ---------- */
  .app-header{
    position:sticky;top:0;z-index:10;
    background:var(--moss-deep);
    color:#fff;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .app-header .title-group{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .app-header .brand-mark{flex-shrink:0;}
  .app-header .title-text{min-width:0;}
  .app-header h2{
    font-size:13px;
    font-weight:700;
    margin:0;
    letter-spacing:0.01em;
    line-height:1.4;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .app-header .staff-name{
    font-size:11px;
    opacity:0.75;
    margin-top:1px;
  }
  .logout-btn{
    background:rgba(255,255,255,0.12);
    border:none;
    color:#fff;
    font-size:12px;
    padding:7px 10px;
    border-radius:6px;
    cursor:pointer;
    flex-shrink:0;
    white-space:nowrap;
  }

  /* ---------- 検索フォームエリア ---------- */
  .search-panel{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:14px 16px 16px;
  }
  .keyword-row{
    margin-bottom:10px;
  }
  .keyword-row input{
    width:100%;
    padding:12px 14px;
    font-size:15px;
    border:1px solid var(--line);
    border-radius:8px;
    outline:none;
    background:#fcfbf8;
  }
  .keyword-row input:focus{border-color:var(--moss);background:#fff;}
  .filters{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
    margin-top:10px;
  }
  .filter-field{display:flex;flex-direction:column;gap:5px;}
  .filter-field.span2{grid-column:1/3;}
  .filter-field label{
    font-size:11px;
    color:var(--muted);
    font-weight:600;
  }
  .filter-field select,
  .filter-field input[type="date"]{
    padding:10px 10px;
    font-size:14px;
    border:1px solid var(--line);
    border-radius:7px;
    background:#fcfbf8;
    color:var(--ink);
  }
  .date-range{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .date-range input[type="date"]{
    flex:1 1 0;
    min-width:0;
  }
  .date-range span{font-size:12px;color:var(--muted);flex-shrink:0;}
  .filter-actions{
    grid-column:1/3;
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .btn-search{
    flex:1;
    padding:12px;
    background:var(--moss);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }
  .btn-clear{
    padding:12px 16px;
    background:#fff;
    color:var(--muted);
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
  }

  /* ---------- 結果リスト ---------- */
  .result-meta{
    padding:12px 16px 6px;
    font-size:12px;
    color:var(--muted);
  }
  .result-list{
    flex:1;
    padding:6px 12px 24px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .result-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:9px;
    padding:14px 15px;
  }
  .result-card .store{
    font-size:18px;
    font-weight:800;
    color:var(--moss-deep);
    margin-bottom:8px;
    padding-bottom:8px;
    border-bottom:2px solid var(--moss);
  }
  .result-card .info-row{
    display:flex;
    padding:5px 0;
    font-size:13px;
    gap:10px;
  }
  .result-card .info-row .k{
    width:38%;
    flex-shrink:0;
    color:var(--muted);
    font-size:12px;
    padding-top:1px;
  }
  .result-card .info-row .v{
    flex:1;
    color:var(--ink);
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .result-card .info-row.claim .v{
    color:var(--danger);
    font-weight:600;
  }
  .result-card .info-row.empty .v{
    color:#b8b4a6;
  }
  .empty-state{
    text-align:center;
    padding:60px 24px;
    color:var(--muted);
  }
  .empty-state .icon{font-size:34px;margin-bottom:10px;opacity:0.5;}
  .empty-state p{font-size:13.5px;line-height:1.7;margin:0;}
  .loading-state{
    text-align:center;
    padding:50px 24px;
    color:var(--muted);
    font-size:13px;
  }
  .spinner{
    width:22px;height:22px;
    border:2.5px solid var(--line);
    border-top-color:var(--moss);
    border-radius:50%;
    margin:0 auto 12px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (min-width:520px){
    .login-card{padding:40px 36px 34px;}
  }
</style>
</head>
<body>

<!-- ============ ログイン画面 ============ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="2"/>
        <path d="M19.5 19.5L15.2 15.2" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>【検索用】<br>事前確認チェックシート</h1>
    <p class="sub">社員IDとパスワードでログインしてください。</p>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="staffId">社員ID</label>
        <input type="text" id="staffId" autocomplete="username" inputmode="text" required>
      </div>
      <div class="field">
        <label for="staffPw">パスワード</label>
        <input type="password" id="staffPw" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">ログイン</button>
    </form>
  </div>
</div>

<!-- ============ 検索画面 ============ -->
<div id="searchScreen" class="screen">
  <div class="app-header">
    <div class="title-group">
      <div class="brand-mark" style="width:30px;height:30px;">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;">
          <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="2"/>
          <path d="M19.5 19.5L15.2 15.2" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="title-text">
        <h2>【検索用】事前確認チェックシート</h2>
        <div class="staff-name" id="staffNameLabel"></div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">ログアウト</button>
  </div>

  <div class="search-panel">
    <div class="keyword-row">
      <input type="text" id="keywordInput" placeholder="フリーワード検索（交渉内容・メモなど）">
    </div>

    <div class="filters" id="filtersPanel">
      <div class="filter-field">
        <label>店舗名</label>
        <select id="filterStore"><option value="">すべて</option></select>
      </div>
      <div class="filter-field">
        <label>店長名</label>
        <select id="filterManager"><option value="">すべて</option></select>
      </div>
      <div class="filter-field">
        <label>スーパー店長名</label>
        <select id="filterSuperManager"><option value="">すべて</option></select>
      </div>
      <div class="filter-field">
        <label>開催日</label>
        <div class="date-range">
          <input type="date" id="filterDateFrom">
          <span>〜</span>
          <input type="date" id="filterDateTo">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn-search" id="execSearchBtn">検索</button>
        <button class="btn-clear" id="clearFiltersBtn">クリア</button>
      </div>
    </div>
  </div>

  <div class="result-meta" id="resultMeta"></div>
  <div class="result-list" id="resultList"></div>
</div>

<script>
/* =========================================================
   設定：ここにGASのウェブアプリURLを貼り付けてください
   ========================================================= */
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwZqydB_UR6Rv7UFGIJ-cvVACknVJ4XVwwwVIgKkufjwHpxJXHR20a22BVMOyCXHHigKg/exec';

/* ---------------- 状態管理 ---------------- */
let state = {
  token: localStorage.getItem('eventSearchToken') || null,
  staffName: localStorage.getItem('eventSearchStaffName') || '',
  results: []
};

const $ = (id) => document.getElementById(id);

/* ---------------- 初期化 ---------------- */
window.addEventListener('DOMContentLoaded', () => {
  if (state.token) {
    showSearchScreen();
  }
});

/* ---------------- API呼び出し共通 ---------------- */
async function callApi(payload) {
  const res = await fetch(GAS_API_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.sessionExpired) {
    alert('セッションの有効期限が切れました。再度ログインしてください。');
    doLogout();
    throw new Error('session expired');
  }
  return data;
}

/* ---------------- ログイン ---------------- */
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const staffId = $('staffId').value.trim();
  const password = $('staffPw').value;
  const errBox = $('loginError');
  const btn = $('loginBtn');

  errBox.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  try {
    const data = await callApi({ action: 'login', staffId, password });
    if (data.success) {
      state.token = data.token;
      state.staffName = data.staffName || '';
      localStorage.setItem('eventSearchToken', state.token);
      localStorage.setItem('eventSearchStaffName', state.staffName);
      showSearchScreen();
    } else {
      errBox.textContent = data.message || 'ログインに失敗しました。';
      errBox.classList.add('show');
    }
  } catch (err) {
    errBox.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
    errBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
});

function doLogout() {
  state.token = null;
  localStorage.removeItem('eventSearchToken');
  localStorage.removeItem('eventSearchStaffName');
  $('searchScreen').classList.remove('active');
  $('loginScreen').classList.add('active');
  $('staffId').value = '';
  $('staffPw').value = '';
}
$('logoutBtn').addEventListener('click', doLogout);

/* ---------------- 検索画面表示 ---------------- */
async function showSearchScreen() {
  $('loginScreen').classList.remove('active');
  $('searchScreen').classList.add('active');
  $('staffNameLabel').textContent = state.staffName ? state.staffName + ' さん' : '';
  await loadOptions();
  await doSearch();
}

/* ---------------- 選択肢ロード ---------------- */
async function loadOptions() {
  try {
    const data = await callApi({ action: 'getOptions', token: state.token });
    if (data.success) {
      fillSelect('filterStore', data.options.store);
      fillSelect('filterManager', data.options.manager);
      fillSelect('filterSuperManager', data.options.superManager);
    }
  } catch (err) {
    // 選択肢取得失敗時もフリーワード検索は使えるよう続行
  }
}
function fillSelect(id, values) {
  const sel = $(id);
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    sel.appendChild(opt);
  });
}

/* ---------------- クリア ---------------- */
$('clearFiltersBtn').addEventListener('click', () => {
  $('filterStore').value = '';
  $('filterManager').value = '';
  $('filterSuperManager').value = '';
  $('filterDateFrom').value = '';
  $('filterDateTo').value = '';
  $('keywordInput').value = '';
  doSearch();
});
$('execSearchBtn').addEventListener('click', doSearch);

/* キーワード入力はEnterで検索 */
$('keywordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

/* ---------------- 検索実行 ---------------- */
let searchSeq = 0;
async function doSearch() {
  const mySeq = ++searchSeq;
  const listEl = $('resultList');
  const metaEl = $('resultMeta');

  listEl.innerHTML = `<div class="loading-state"><div class="spinner"></div>検索しています...</div>`;
  metaEl.textContent = '';

  const filters = {
    store: $('filterStore').value,
    manager: $('filterManager').value,
    superManager: $('filterSuperManager').value,
    dateFrom: $('filterDateFrom').value,
    dateTo: $('filterDateTo').value
  };
  const keyword = $('keywordInput').value.trim();

  try {
    const data = await callApi({ action: 'search', token: state.token, filters, keyword });
    if (mySeq !== searchSeq) return; // 古いリクエストの結果は破棄

    if (!data.success) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtml(data.message || '検索に失敗しました。')}</p></div>`;
      return;
    }

    state.results = data.results;
    renderResults(data);
  } catch (err) {
    if (mySeq !== searchSeq) return;
    listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>通信エラーが発生しました。時間をおいて再度お試しください。</p></div>`;
  }
}

/* 一覧カードに表示する項目（この並び順で表示） */
const CARD_FIELDS = [
  { key: 'レコード番号', label: 'レコード番号' },
  { key: 'スーパー店長名', label: 'スーパー店長の名前' },
  { key: '初日の対応者', label: '初日の対応者（催事責任者）' },
  { key: '過去のクレーム事案', label: '過去のクレーム事案（注意事項）', claim: true },
  { key: 'その他備考', label: 'その他備考（例：搬入時間、場所など）' }
];

function renderResults(data) {
  const listEl = $('resultList');
  const metaEl = $('resultMeta');

  if (data.results.length === 0) {
    metaEl.textContent = '';
    listEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>該当する記録が見つかりませんでした。<br>条件を変えて再度検索してください。</p></div>`;
    return;
  }

  let metaText = `${data.count}件 ヒット`;
  if (data.truncated) metaText += `（上位200件を表示中。絞り込みで対象を減らしてください）`;
  metaEl.textContent = metaText;

  listEl.innerHTML = data.results.map((item) => {
    const rows = CARD_FIELDS.map(f => {
      const raw = item[f.key];
      const hasValue = raw !== undefined && raw !== null && String(raw).trim() !== '';
      const cls = f.claim && hasValue ? 'claim' : (!hasValue ? 'empty' : '');
      const valueText = hasValue ? escapeHtml(String(raw)) : 'なし';
      return `
        <div class="info-row ${cls}">
          <div class="k">${escapeHtml(f.label)}</div>
          <div class="v">${valueText}</div>
        </div>`;
    }).join('');

    return `
      <div class="result-card">
        <div class="store">${escapeHtml(item['店舗名'] || '（店舗名未記入）')}</div>
        ${rows}
      </div>
    `;
  }).join('');
}

/* ---------------- ユーティリティ ---------------- */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
