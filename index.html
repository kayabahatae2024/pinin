<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>【検索用】事前確認チェックシート</title>
<style>
  :root{
    --ink:#1c1f1a;
    --paper:#f7f5ef;
    --line:#d8d4c4;
    --moss:#3f5b44;
    --moss-deep:#2c4131;
    --clay:#b5563a;
    --muted:#7a7666;
    --card:#ffffff;
    --danger:#b5563a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  /* ---------- レイアウト共通 ---------- */
  .screen{
    display:none;
    min-height:100vh;
    flex-direction:column;
  }
  .screen.active{display:flex;}

  /* ---------- ログイン画面 ---------- */
  #loginScreen{
    justify-content:center;
    align-items:center;
    padding:24px;
    background:
      radial-gradient(circle at 15% 10%, rgba(63,91,68,0.08), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(181,86,58,0.07), transparent 45%),
      var(--paper);
  }
  .login-card{
    width:100%;
    max-width:360px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px 26px 28px;
    box-shadow:0 1px 2px rgba(28,31,26,0.04);
  }
  .brand-mark{
    width:40px;height:40px;
    border-radius:8px;
    background:var(--moss);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:18px;
  }
  .brand-mark svg{width:20px;height:20px;}
  .login-card h1{
    font-size:18px;
    font-weight:700;
    margin:0 0 8px;
    letter-spacing:0.02em;
    line-height:1.5;
  }
  .login-card .sub{
    font-size:12.5px;
    color:var(--muted);
    margin:0 0 26px;
    line-height:1.6;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:11.5px;
    font-weight:600;
    color:var(--muted);
    letter-spacing:0.04em;
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:13px 14px;
    font-size:16px;
    border:1px solid var(--line);
    border-radius:8px;
    background:#fcfbf8;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--moss);background:#fff;}
  .pw-wrap{
    position:relative;
    display:flex;
    align-items:center;
  }
  .pw-wrap input{
    flex:1;
    padding-right:46px; /* ボタン分の余白 */
  }
  .pw-toggle{
    position:absolute;
    right:12px;
    background:none;
    border:none;
    cursor:pointer;
    padding:4px;
    color:var(--muted);
    display:flex;
    align-items:center;
    justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .pw-toggle svg{width:20px;height:20px;}
  .btn-primary{
    width:100%;
    padding:14px;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.03em;
    color:#fff;
    background:var(--moss);
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:6px;
    transition:background .15s, transform .1s;
  }
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{background:#a9a397;cursor:default;}
  .login-error{
    display:none;
    background:#fbeae5;
    color:var(--danger);
    font-size:12.5px;
    padding:10px 12px;
    border-radius:7px;
    margin-bottom:16px;
    line-height:1.5;
  }
  .login-error.show{display:block;}

  /* ---------- 検索画面ヘッダー ---------- */
  .app-header{
    position:sticky;top:0;z-index:10;
    background:var(--moss-deep);
    color:#fff;
    padding:12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .app-header .title-group{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .app-header .brand-mark{flex-shrink:0;}
  .app-header .title-text{min-width:0;}
  .app-header h2{
    font-size:13px;
    font-weight:700;
    margin:0;
    letter-spacing:0.01em;
    line-height:1.4;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .app-header .staff-name{
    font-size:11px;
    opacity:0.75;
    margin-top:1px;
  }
  .logout-btn{
    background:rgba(255,255,255,0.12);
    border:none;
    color:#fff;
    font-size:12px;
    padding:7px 10px;
    border-radius:6px;
    cursor:pointer;
    flex-shrink:0;
    white-space:nowrap;
  }

  /* ---------- 検索フォームエリア ---------- */
  .search-panel{
    background:var(--card);
    border-bottom:1px solid var(--line);
    padding:14px 16px 16px;
  }
  .keyword-row{
    display:flex;
    gap:8px;
  }
  .keyword-row input{
    flex:1;
    min-width:0;
    padding:12px 14px;
    font-size:15px;
    border:1px solid var(--line);
    border-radius:8px;
    outline:none;
    background:#fcfbf8;
  }
  .keyword-row input:focus{border-color:var(--moss);background:#fff;}
  .btn-search{
    flex-shrink:0;
    padding:12px 20px;
    background:var(--moss);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }

  /* ---------- 結果リスト ---------- */
  .result-meta{
    padding:12px 16px 6px;
    font-size:12px;
    color:var(--muted);
    line-height:1.7;
  }
  .result-meta .count{
    font-weight:700;
    color:var(--ink);
  }
  .result-meta .order-note{
    display:block;
    font-size:11.5px;
    color:var(--muted);
  }
  .pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    padding:10px 16px;
  }
  .pagination:empty{display:none;padding:0;}
  .page-btn{
    min-width:32px;
    height:32px;
    padding:0 8px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink);
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
  }
  .page-btn.active{
    background:var(--moss);
    border-color:var(--moss);
    color:#fff;
    font-weight:700;
  }
  .page-btn:disabled{
    opacity:0.35;
    cursor:default;
  }
  .page-ellipsis{
    color:var(--muted);
    font-size:13px;
    padding:0 2px;
  }
  .result-list{
    flex:1;
    padding:6px 12px 24px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .result-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:9px;
    padding:14px 15px;
  }
  .result-card .store{
    font-size:18px;
    font-weight:800;
    color:var(--moss-deep);
    margin-bottom:8px;
    padding-bottom:8px;
    border-bottom:2px solid var(--moss);
  }
  .result-card .info-row{
    display:flex;
    padding:5px 0;
    font-size:13px;
    gap:10px;
  }
  .result-card .info-row .k{
    width:38%;
    flex-shrink:0;
    color:var(--muted);
    font-size:12px;
    padding-top:1px;
  }
  .result-card .info-row .v{
    flex:1;
    color:var(--ink);
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .result-card .info-row.claim .v{
    color:var(--danger);
    font-weight:600;
  }
  .result-card .info-row.empty .v{
    color:#b8b4a6;
  }
  .empty-state{
    text-align:center;
    padding:60px 24px;
    color:var(--muted);
  }
  .empty-state .icon{font-size:34px;margin-bottom:10px;opacity:0.5;}
  .empty-state p{font-size:13.5px;line-height:1.7;margin:0;}
  .loading-state{
    text-align:center;
    padding:50px 24px;
    color:var(--muted);
    font-size:13px;
  }
  .spinner{
    width:22px;height:22px;
    border:2.5px solid var(--line);
    border-top-color:var(--moss);
    border-radius:50%;
    margin:0 auto 12px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (min-width:520px){
    .login-card{padding:40px 36px 34px;}
  }
</style>
</head>
<body>

<!-- ============ ログイン画面 ============ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="2"/>
        <path d="M19.5 19.5L15.2 15.2" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>【検索用】<br>事前確認チェックシート</h1>
    <p class="sub">社員IDとパスワードでログインしてください。</p>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm">
      <div class="field">
        <label for="staffId">社員ID</label>
        <input type="text" id="staffId" autocomplete="username" inputmode="text" required>
      </div>
      <div class="field">
        <label for="staffPw">パスワード</label>
        <div class="pw-wrap">
          <input type="password" id="staffPw" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="パスワードを表示">
            <!-- 目アイコン（非表示状態） -->
            <svg id="iconEye" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <!-- 目に斜線アイコン（表示状態） -->
            <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20C5 20 1 12 1 12A18.45 18.45 0 015.06 5.06M9.9 4.24A9.12 9.12 0 0112 4C19 4 23 12 23 12A18.5 18.5 0 0120.38 16M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">ログイン</button>
    </form>
  </div>
</div>

<!-- ============ 検索画面 ============ -->
<div id="searchScreen" class="screen">
  <div class="app-header">
    <div class="title-group">
      <div class="brand-mark" style="width:30px;height:30px;">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;">
          <circle cx="10.5" cy="10.5" r="6.5" stroke="white" stroke-width="2"/>
          <path d="M19.5 19.5L15.2 15.2" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="title-text">
        <h2>【検索用】事前確認チェックシート</h2>
        <div class="staff-name" id="staffNameLabel"></div>
      </div>
    </div>
    <button class="logout-btn" id="logoutBtn">ログアウト</button>
  </div>

  <div class="search-panel">
    <div class="keyword-row">
      <input type="text" id="keywordInput" placeholder="店舗名・担当者名などで検索（スペース区切りでAND検索）">
      <button class="btn-search" id="execSearchBtn">検索</button>
    </div>
  </div>

  <div class="result-meta" id="resultMeta"></div>
  <div class="pagination" id="paginationTop"></div>
  <div class="result-list" id="resultList"></div>
  <div class="pagination" id="paginationBottom"></div>
</div>

<script>
/* =========================================================
   設定：ここにGASのウェブアプリURLを貼り付けてください
   ========================================================= */
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwZqydB_UR6Rv7UFGIJ-cvVACknVJ4XVwwwVIgKkufjwHpxJXHR20a22BVMOyCXHHigKg/exec';

/* ---------------- 状態管理 ---------------- */
let state = {
  token: localStorage.getItem('eventSearchToken') || null,
  staffName: localStorage.getItem('eventSearchStaffName') || '',
  results: [],
  currentPage: 1
};

const $ = (id) => document.getElementById(id);

/* ---------------- 初期化 ---------------- */
window.addEventListener('DOMContentLoaded', () => {
  if (state.token) {
    showSearchScreen();
  }
});

/* ---------------- API呼び出し共通 ---------------- */
async function callApi(payload) {
  const res = await fetch(GAS_API_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.sessionExpired) {
    alert('セッションの有効期限が切れました。再度ログインしてください。');
    doLogout();
    throw new Error('session expired');
  }
  return data;
}

/* ---------------- ログイン ---------------- */
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const staffId = $('staffId').value.trim();
  const password = $('staffPw').value;
  const errBox = $('loginError');
  const btn = $('loginBtn');

  errBox.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'ログイン中...';

  try {
    const data = await callApi({ action: 'login', staffId, password });
    if (data.success) {
      state.token = data.token;
      state.staffName = data.staffName || '';
      localStorage.setItem('eventSearchToken', state.token);
      localStorage.setItem('eventSearchStaffName', state.staffName);
      showSearchScreen();
    } else {
      errBox.textContent = data.message || 'ログインに失敗しました。';
      errBox.classList.add('show');
    }
  } catch (err) {
    errBox.textContent = '通信エラーが発生しました。時間をおいて再度お試しください。';
    errBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
});

/* ---------------- パスワード表示切り替え ---------------- */
$('pwToggle').addEventListener('click', () => {
  const input = $('staffPw');
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  $('iconEye').style.display = isHidden ? 'none' : '';
  $('iconEyeOff').style.display = isHidden ? '' : 'none';
});

/* ---------------- キーボード表示時にPW欄が隠れないようにする ---------------- */
// iOSのSafariではvisualViewportでキーボード高さを検知できる
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const loginScreen = $('loginScreen');
    if (!loginScreen.classList.contains('active')) return;
    const viewportHeight = window.visualViewport.height;
    const focused = document.activeElement;
    if (!focused || (focused.id !== 'staffId' && focused.id !== 'staffPw')) return;
    // フォーカスした要素の下端がビューポートに入るよう、少し上にスクロール
    setTimeout(() => {
      focused.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  });
}

function doLogout() {
  state.token = null;
  localStorage.removeItem('eventSearchToken');
  localStorage.removeItem('eventSearchStaffName');
  $('searchScreen').classList.remove('active');
  $('loginScreen').classList.add('active');
  $('staffId').value = '';
  $('staffPw').value = '';
  // パスワードを非表示状態に戻す
  $('staffPw').type = 'password';
  $('iconEye').style.display = '';
  $('iconEyeOff').style.display = 'none';
}
$('logoutBtn').addEventListener('click', doLogout);

/* ---------------- 検索画面表示 ---------------- */
async function showSearchScreen() {
  $('loginScreen').classList.remove('active');
  $('searchScreen').classList.add('active');
  $('staffNameLabel').textContent = state.staffName ? state.staffName + ' さん' : '';
  scrollSearchScreenToTop();
  await doSearch();
}

$('execSearchBtn').addEventListener('click', doSearch);

/* キーワード入力はEnterで検索 */
$('keywordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doSearch();
});

/* ---------------- 検索実行 ---------------- */
let searchSeq = 0;
async function doSearch() {
  const mySeq = ++searchSeq;
  const listEl = $('resultList');
  const metaEl = $('resultMeta');

  listEl.innerHTML = `<div class="loading-state"><div class="spinner"></div>検索しています...</div>`;
  metaEl.innerHTML = '';
  $('paginationTop').innerHTML = '';
  $('paginationBottom').innerHTML = '';

  const keyword = $('keywordInput').value.trim();

  try {
    const data = await callApi({ action: 'search', token: state.token, keyword });
    if (mySeq !== searchSeq) return; // 古いリクエストの結果は破棄

    if (!data.success) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtml(data.message || '検索に失敗しました。')}</p></div>`;
      return;
    }

    state.results = data.results;
    renderResults(data, 1);
  } catch (err) {
    if (mySeq !== searchSeq) return;
    listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>通信エラーが発生しました。時間をおいて再度お試しください。</p></div>`;
  }
}

/* 一覧カードに表示する項目（この並び順で表示） */
const CARD_FIELDS = [
  { key: 'レコード番号', label: 'レコード番号' },
  { key: 'スーパー店長名', label: 'スーパー店長の名前' },
  { key: '初日の対応者', label: '初日の対応者（催事責任者）' },
  { key: '過去のクレーム事案', label: '過去のクレーム事案（注意事項）', claim: true },
  { key: 'その他備考', label: 'その他備考（例：搬入時間、場所など）' }
];

const PAGE_SIZE = 10;

function renderResults(data, page) {
  const listEl = $('resultList');
  const metaEl = $('resultMeta');
  const topEl = $('paginationTop');
  const bottomEl = $('paginationBottom');

  if (data.results.length === 0) {
    metaEl.innerHTML = '';
    listEl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>該当する記録が見つかりませんでした。<br>条件を変えて再度検索してください。</p></div>`;
    topEl.innerHTML = '';
    bottomEl.innerHTML = '';
    return;
  }

  const totalCount = data.results.length;
  const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
  state.currentPage = Math.min(Math.max(1, page || 1), totalPages);

  let metaText = `<span class="count">${data.count}件 ヒット</span>`;
  if (data.truncated) metaText += `（上位200件を表示中。検索ワードを増やして対象を減らしてください）`;
  metaText += `<span class="order-note">検索結果は新着順（最新→過去）です。</span>`;
  metaEl.innerHTML = metaText;

  const startIdx = (state.currentPage - 1) * PAGE_SIZE;
  const pageItems = data.results.slice(startIdx, startIdx + PAGE_SIZE);

  listEl.innerHTML = pageItems.map((item) => {
    const rows = CARD_FIELDS.map(f => {
      const raw = item[f.key];
      const hasValue = raw !== undefined && raw !== null && String(raw).trim() !== '';
      const cls = f.claim && hasValue ? 'claim' : (!hasValue ? 'empty' : '');
      const valueText = hasValue ? escapeHtml(String(raw)) : 'なし';
      return `
        <div class="info-row ${cls}">
          <div class="k">${escapeHtml(f.label)}</div>
          <div class="v">${valueText}</div>
        </div>`;
    }).join('');

    return `
      <div class="result-card">
        <div class="store">${escapeHtml(item['店舗名'] || '（店舗名未記入）')}</div>
        ${rows}
      </div>
    `;
  }).join('');

  const paginationHtml = buildPaginationHtml(state.currentPage, totalPages);
  topEl.innerHTML = paginationHtml;
  bottomEl.innerHTML = paginationHtml;

  [topEl, bottomEl].forEach(el => {
    el.querySelectorAll('.page-btn[data-page]').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetPage = parseInt(btn.dataset.page, 10);
        renderResults(data, targetPage);
        scrollSearchScreenToTop();
      });
    });
  });
}

/* ページネーションのHTMLを組み立てる（先頭・末尾固定＋現在地周辺のみ表示） */
function buildPaginationHtml(current, total) {
  if (total <= 1) return '';

  const pages = new Set();
  pages.add(1);
  pages.add(total);
  for (let p = current - 1; p <= current + 1; p++) {
    if (p >= 1 && p <= total) pages.add(p);
  }
  const sorted = Array.from(pages).sort((a, b) => a - b);

  let html = `<button class="page-btn" data-page="${current - 1}" ${current === 1 ? 'disabled' : ''}>‹</button>`;

  let prev = 0;
  sorted.forEach(p => {
    if (prev && p - prev > 1) {
      html += `<span class="page-ellipsis">…</span>`;
    }
    html += `<button class="page-btn ${p === current ? 'active' : ''}" data-page="${p}">${p}</button>`;
    prev = p;
  });

  html += `<button class="page-btn" data-page="${current + 1}" ${current === total ? 'disabled' : ''}>›</button>`;
  return html;
}

/* 検索画面の先頭にスクロール（ページ遷移時に使用） */
function scrollSearchScreenToTop() {
  window.scrollTo({ top: 0, behavior: 'instant' in document.documentElement.style ? 'instant' : 'auto' });
  const screenEl = $('searchScreen');
  if (screenEl) screenEl.scrollTop = 0;
}

/* ---------------- ユーティリティ ---------------- */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
